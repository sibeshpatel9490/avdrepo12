name: run python program with dependencies
on:
    push:
        branches:
            - main

jobs:
    extract-data:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v2
            - name: show python version
              run: python --version
            - name: use python 3.10 version
              uses: actions/setup-python@v4
              with:
                python-version: '3.10'
            - name: show python version
              run: python --version
            - name: installing dependencies
              run: pip install -r requirements.txt
            - name: run puthon program
              run: python extract_data.py 