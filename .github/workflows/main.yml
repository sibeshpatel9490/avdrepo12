name: quality gate check
on:
    push:
        branches:
            - main
jobs:
    ci-job:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v2
            - name: installing dependencies
              run: pip install -r requirements.txt
            - name: run test and enforce coverage
              run: |
                pytest --cov=calc --cov-report=term --cov-report=html --cov-fail-under=80
            - name: upload code coverage report
              uses: actions/upload-artifact@v4
              with:
                name: html-code-coverage-report
                path: htmlpage/
    cd-job:
        runs-on: ubuntu-latest
        needs: ci-job
        steps:
            - name: checkout code
              uses: actions/checkout@v2
            - name: print message
              run: echo 'deployment done...'